# Example Nginx reverse proxy config for Metal Detect Tracker
# Copy to /etc/nginx/sites-available/ and symlink to /etc/nginx/sites-enabled/
#
# Replace "yourdomain.com" with your actual domain.
#
# After placing, run:
#   sudo nginx -t && sudo systemctl reload nginx
#
# For SSL (run once after DNS is pointing):
#   sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com;

    # Redirect HTTP to HTTPS (certbot will add the SSL block)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # SSL certs — managed by certbot (paths will be updated automatically)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Max upload size (matches multer 5MB limit + overhead)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
