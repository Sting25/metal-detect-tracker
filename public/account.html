<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PK15CRVY76"></script>
    <script src="/js/analytics.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Account Settings - Signal Bouncer</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#5c4033">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/landing.html" class="nav-brand"><img src="/icons/logo-nav.png" alt="" class="nav-brand-logo" width="28" height="28"><span class="nav-brand-full" data-i18n="app.name">Signal Bouncer</span><span class="nav-brand-short">Signal Bouncer</span></a>
        <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
        <div class="nav-links">
            <a href="/index.html" data-i18n="nav.dashboard">Dashboard</a>
            <a href="/sites.html" data-i18n="nav.sites">Sites</a>
            <a href="/finds.html" data-i18n="nav.finds">Finds</a>
            <a href="/hunts.html" data-i18n="nav.hunts">Hunts</a>
            <a href="/permissions.html" data-i18n="nav.permissions">Permissions</a>
            <a href="/legal.html" data-i18n="nav.legal">Legal Reference</a>
        </div>
    </nav>

    <main class="account-page">
        <div class="page-header">
            <h1 class="page-title" data-i18n="account.title">Account Settings</h1>
        </div>

        <!-- Profile Section -->
        <section class="account-section">
            <h2 class="section-title" data-i18n="account.profile">Profile</h2>
            <div class="settings-card">
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label" data-i18n="auth.label.email">Email</span>
                        <span class="setting-description" id="profile-email">-</span>
                    </div>
                </div>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label" data-i18n="auth.label.displayName">Display Name</span>
                        <span class="setting-description" id="profile-name">-</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Sign-in Methods Section -->
        <section class="account-section">
            <h2 class="section-title" data-i18n="account.authMethods">Sign-in Methods</h2>
            <div class="settings-card">
                <!-- Password -->
                <div class="auth-method-row" id="password-row">
                    <div class="auth-method-info">
                        <span class="auth-method-icon">&#128274;</span>
                        <div>
                            <span class="auth-method-name" data-i18n="account.password">Password</span>
                            <span class="auth-method-status" id="password-status"></span>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-secondary" id="btn-change-password" data-i18n="account.changePassword">Change Password</button>
                </div>

                <!-- Google -->
                <div class="auth-method-row" id="google-row">
                    <div class="auth-method-info">
                        <span class="auth-method-icon">G</span>
                        <div>
                            <span class="auth-method-name" data-i18n="account.google">Google</span>
                            <span class="auth-method-status" id="google-status"></span>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-secondary hidden" id="btn-link-google" data-i18n="account.linkGoogle">Link Google</button>
                    <button class="btn btn-sm btn-outline hidden" id="btn-unlink-google" data-i18n="account.unlinkGoogle">Unlink</button>
                </div>
            </div>
        </section>

        <!-- Passkeys Section -->
        <section class="account-section" id="passkeys-section">
            <div class="section-header">
                <h2 class="section-title" data-i18n="account.passkeys">Passkeys</h2>
                <button class="btn btn-primary btn-sm" id="btn-add-passkey" data-i18n="account.addPasskey">+ Add Passkey</button>
            </div>
            <div class="settings-card">
                <div id="passkey-list">
                    <p class="text-muted" id="no-passkeys-msg" data-i18n="account.noPasskeys">No passkeys registered</p>
                </div>
            </div>
        </section>

        <!-- Change Password Modal (inline) -->
        <div id="password-modal" class="account-modal hidden">
            <div class="account-modal-content">
                <h3 id="password-modal-title" data-i18n="account.changePassword">Change Password</h3>
                <form id="password-form">
                    <div class="form-group" id="current-password-group">
                        <label for="current-password" data-i18n="account.currentPassword">Current Password</label>
                        <input type="password" id="current-password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password" data-i18n="account.newPassword">New Password</label>
                        <input type="password" id="new-password" class="form-control" required minlength="12" placeholder="At least 12 characters">
                        <small class="form-hint" data-i18n="auth.passwordHint">Must be at least 12 characters</small>
                    </div>
                    <div class="form-group">
                        <label for="confirm-new-password" data-i18n="auth.label.confirmPassword">Confirm Password</label>
                        <input type="password" id="confirm-new-password" class="form-control" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="btn-cancel-password" data-i18n="common.cancel">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="btn-save-password" data-i18n="common.save">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="account-toast" class="account-toast hidden"></div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/auth-nav.js"></script>
    <script src="/js/auth-widgets.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/offline-store.js"></script>
    <script src="/js/sync-engine.js"></script>
    <script src="/js/offline-ui.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/account.js"></script>
    <script src="/js/sw-register.js"></script>
</body>
</html>
