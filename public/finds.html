<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PK15CRVY76"></script>
    <script src="/js/analytics.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Finds - Signal Bouncer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#5c4033">
</head>
<body>
    <nav class="navbar">
        <a href="/landing.html" class="nav-brand"><img src="/icons/logo-nav.png" alt="" class="nav-brand-logo" width="28" height="28"><span class="nav-brand-full" data-i18n="app.name">Signal Bouncer</span><span class="nav-brand-short">Signal Bouncer</span></a>
        <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
        <div class="nav-links">
            <a href="/index.html" data-i18n="nav.dashboard">Dashboard</a>
            <a href="/sites.html" data-i18n="nav.sites">Sites</a>
            <a href="/finds.html" class="active" data-i18n="nav.finds">Finds</a>
            <a href="/hunts.html" data-i18n="nav.hunts">Hunts</a>
            <a href="/permissions.html" data-i18n="nav.permissions">Permissions</a>
            <a href="/legal.html" data-i18n="nav.legal">Legal Reference</a>
        </div>
    </nav>

    <main class="finds-page">
        <div class="page-header">
            <h1 class="page-title" data-i18n="finds.title">Finds</h1>
            <div class="page-header-actions">
                <button class="btn btn-secondary btn-lg" id="btn-quick-log" data-i18n="finds.quickLog.btn">&#9889; Quick Log</button>
                <button class="btn btn-primary btn-lg" id="btn-add-find" data-i18n="finds.addNew">+ Log New Find</button>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <select id="filter-site" class="filter-input">
                <option value="" data-i18n="finds.filter.allSites">All Sites</option>
            </select>
            <select id="filter-material" class="filter-input">
                <option value="" data-i18n="finds.filter.allMaterials">All Materials</option>
                <option value="iron" data-i18n="material.iron">Iron</option>
                <option value="copper" data-i18n="material.copper">Copper</option>
                <option value="brass" data-i18n="material.brass">Brass</option>
                <option value="silver" data-i18n="material.silver">Silver</option>
                <option value="gold" data-i18n="material.gold">Gold</option>
                <option value="lead" data-i18n="material.lead">Lead</option>
                <option value="zinc" data-i18n="material.zinc">Zinc</option>
                <option value="nickel" data-i18n="material.nickel">Nickel</option>
                <option value="aluminum" data-i18n="material.aluminum">Aluminum</option>
                <option value="tin" data-i18n="material.tin">Tin</option>
                <option value="unknown" data-i18n="material.unknown">Unknown</option>
                <option value="other" data-i18n="material.other">Other</option>
            </select>
            <select id="filter-category" class="filter-input">
                <option value="" data-i18n="finds.filter.allCategories">All Categories</option>
                <option value="coin" data-i18n="category.coin">Coin</option>
                <option value="jewelry" data-i18n="category.jewelry">Jewelry</option>
                <option value="relic" data-i18n="category.relic">Relic</option>
                <option value="military" data-i18n="category.military">Military</option>
                <option value="button" data-i18n="category.button">Button</option>
                <option value="buckle" data-i18n="category.buckle">Buckle</option>
                <option value="tool" data-i18n="category.tool">Tool</option>
                <option value="toy" data-i18n="category.toy">Toy</option>
                <option value="natural" data-i18n="category.natural">Natural</option>
                <option value="trash" data-i18n="category.trash">Trash</option>
                <option value="unknown" data-i18n="category.unknown">Unknown</option>
            </select>
            <div class="filter-date-range">
                <input type="date" id="filter-date-from" class="filter-input" title="From date">
                <span class="filter-date-sep" data-i18n="finds.filter.dateTo">to</span>
                <input type="date" id="filter-date-to" class="filter-input" title="To date">
            </div>
        </div>

        <!-- Finds Card Grid -->
        <div id="finds-grid" class="finds-card-grid">
            <p class="loading-text" data-i18n="finds.loading">Loading finds...</p>
        </div>
    </main>

    <!-- Add/Edit Find Modal -->
    <div class="modal-overlay" id="find-modal-overlay">
        <div class="modal" id="find-modal">
            <div class="modal-header">
                <h2 id="find-modal-title" data-i18n="finds.modal.addTitle">Log New Find</h2>
                <button class="modal-close" id="btn-find-modal-close">&times;</button>
            </div>
            <form id="find-form" class="modal-body">
                <input type="hidden" id="find-id" name="id">

                <div class="form-group">
                    <label for="find-site" data-i18n="finds.label.site">Site *</label>
                    <select id="find-site" name="site_id" required class="form-control">
                        <option value="" data-i18n="finds.placeholder.selectSite">Select a site...</option>
                    </select>
                    <div id="quick-site-create" style="display:none;" class="quick-create-row">
                        <input type="text" id="quick-site-name" class="form-control" placeholder="Site name" data-i18n-placeholder="finds.quickSiteName">
                        <button type="button" id="quick-site-save" class="btn btn-primary btn-sm" data-i18n="finds.quickSiteCreate">Create</button>
                        <button type="button" id="quick-site-cancel" class="btn btn-sm" data-i18n="finds.quickSiteCancel">Cancel</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="find-date" data-i18n="finds.label.date">Date</label>
                    <input type="date" id="find-date" name="date" class="form-control">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="find-latitude" data-i18n="finds.label.latitude">Latitude</label>
                        <input type="number" id="find-latitude" name="latitude" class="form-control" step="any" placeholder="Optional" data-i18n-placeholder="finds.placeholder.latOptional">
                    </div>
                    <div class="form-group">
                        <label for="find-longitude" data-i18n="finds.label.longitude">Longitude</label>
                        <input type="number" id="find-longitude" name="longitude" class="form-control" step="any" placeholder="Optional" data-i18n-placeholder="finds.placeholder.lngOptional">
                    </div>
                    <div class="form-group form-group-btn">
                        <button type="button" class="btn btn-secondary" id="btn-use-location" data-i18n="finds.btn.useLocation">Use Current Location</button>
                    </div>
                </div>

                <div class="form-group">
                    <label data-i18n="finds.label.photos">Photos</label>
                    <div id="find-photo-gallery" class="photo-gallery"></div>
                    <div class="upload-area upload-area-sm" id="find-upload-area">
                        <div class="upload-placeholder" id="find-upload-placeholder">
                            <span class="upload-icon">&#128247;</span>
                            <p data-i18n="finds.placeholder.addPhotos">Add photos (up to 10)</p>
                        </div>
                        <input type="file" id="find-photos-input" name="photos" accept="image/*" capture="environment" multiple class="upload-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="find-description" data-i18n="finds.label.description">Description *</label>
                    <input type="text" id="find-description" name="description" required class="form-control" placeholder="What did you find?" data-i18n-placeholder="finds.placeholder.description">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="find-material" data-i18n="finds.label.material">Material</label>
                        <select id="find-material" name="material" class="form-control">
                            <option value="" data-i18n="common.select">Select...</option>
                            <option value="iron" data-i18n="material.iron">Iron</option>
                            <option value="copper" data-i18n="material.copper">Copper</option>
                            <option value="brass" data-i18n="material.brass">Brass</option>
                            <option value="silver" data-i18n="material.silver">Silver</option>
                            <option value="gold" data-i18n="material.gold">Gold</option>
                            <option value="lead" data-i18n="material.lead">Lead</option>
                            <option value="zinc" data-i18n="material.zinc">Zinc</option>
                            <option value="nickel" data-i18n="material.nickel">Nickel</option>
                            <option value="aluminum" data-i18n="material.aluminum">Aluminum</option>
                            <option value="tin" data-i18n="material.tin">Tin</option>
                            <option value="unknown" data-i18n="material.unknown">Unknown</option>
                            <option value="other" data-i18n="material.other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="find-estimated-age" data-i18n="finds.label.estimatedAge">Estimated Age</label>
                        <input type="text" id="find-estimated-age" name="estimated_age" class="form-control" placeholder="e.g. 1850s" data-i18n-placeholder="finds.placeholder.estimatedAge">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="find-category" data-i18n="finds.label.category">Category</label>
                        <select id="find-category" name="category" class="form-control">
                            <option value="" data-i18n="common.select">Select...</option>
                            <option value="coin" data-i18n="category.coin">Coin</option>
                            <option value="jewelry" data-i18n="category.jewelry">Jewelry</option>
                            <option value="relic" data-i18n="category.relic">Relic</option>
                            <option value="military" data-i18n="category.military">Military</option>
                            <option value="button" data-i18n="category.button">Button</option>
                            <option value="buckle" data-i18n="category.buckle">Buckle</option>
                            <option value="tool" data-i18n="category.tool">Tool</option>
                            <option value="toy" data-i18n="category.toy">Toy</option>
                            <option value="natural" data-i18n="category.natural">Natural</option>
                            <option value="trash" data-i18n="category.trash">Trash</option>
                            <option value="unknown" data-i18n="category.unknown">Unknown</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="find-tags-input" data-i18n="finds.label.tags">Tags</label>
                    <div id="find-tags-display" class="tags-display"></div>
                    <input type="text" id="find-tags-input" class="form-control" placeholder="Type a tag and press Enter..." data-i18n-placeholder="finds.placeholder.tags">
                    <input type="hidden" id="find-tags" name="tags">
                    <div id="find-tag-suggestions" class="tag-suggestions"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="find-depth" data-i18n="finds.label.depth">Depth (inches)</label>
                        <input type="number" id="find-depth" name="depth" class="form-control" min="0" step="0.5" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="find-condition" data-i18n="finds.label.condition">Condition</label>
                        <select id="find-condition" name="condition" class="form-control">
                            <option value="" data-i18n="common.select">Select...</option>
                            <option value="excellent" data-i18n="condition.excellent">Excellent</option>
                            <option value="good" data-i18n="condition.good">Good</option>
                            <option value="fair" data-i18n="condition.fair">Fair</option>
                            <option value="poor" data-i18n="condition.poor">Poor</option>
                            <option value="fragment" data-i18n="condition.fragment">Fragment</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="find-value" data-i18n="finds.label.value">Value Estimate ($)</label>
                    <input type="number" id="find-value" name="value_estimate" class="form-control" min="0" step="0.01" placeholder="0.00" data-i18n-placeholder="finds.placeholder.value">
                </div>

                <div class="form-group">
                    <label for="find-notes" data-i18n="finds.label.notes">Notes</label>
                    <textarea id="find-notes" name="notes" class="form-control" rows="3" placeholder="Additional notes..." data-i18n-placeholder="finds.placeholder.notes"></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" id="btn-delete-find" style="display:none;" data-i18n="finds.modal.delete">Delete</button>
                    <div class="modal-footer-right">
                        <button type="button" class="btn btn-secondary" id="btn-cancel-find" data-i18n="finds.modal.cancel">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="btn-save-find" data-i18n="finds.modal.save">Save Find</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Quick Log Modal -->
    <div class="modal-overlay" id="quick-log-overlay">
        <div class="modal modal-compact" id="quick-log-modal">
            <div class="modal-header">
                <h2 data-i18n="finds.quickLog.title">Quick Log</h2>
                <button class="modal-close" id="btn-quick-log-close">&times;</button>
            </div>
            <form id="quick-log-form" class="modal-body">
                <div class="form-group">
                    <div class="upload-area upload-area-compact" id="quick-log-upload-area">
                        <div class="upload-placeholder" id="quick-log-upload-placeholder">
                            <span class="upload-icon">&#128247;</span>
                            <p data-i18n="finds.quickLog.tapPhoto">Tap to add photo</p>
                        </div>
                        <img id="quick-log-preview" style="display:none; width:100%; max-height:200px; object-fit:contain; border-radius:8px;">
                        <input type="file" id="quick-log-photo" accept="image/*" capture="environment" class="upload-input">
                    </div>
                </div>
                <div class="form-group">
                    <select id="quick-log-category" class="form-control">
                        <option value="" data-i18n="finds.label.category">Category</option>
                        <option value="coin" data-i18n="category.coin">Coin</option>
                        <option value="jewelry" data-i18n="category.jewelry">Jewelry</option>
                        <option value="relic" data-i18n="category.relic">Relic</option>
                        <option value="military" data-i18n="category.military">Military</option>
                        <option value="button" data-i18n="category.button">Button</option>
                        <option value="buckle" data-i18n="category.buckle">Buckle</option>
                        <option value="tool" data-i18n="category.tool">Tool</option>
                        <option value="toy" data-i18n="category.toy">Toy</option>
                        <option value="natural" data-i18n="category.natural">Natural</option>
                        <option value="trash" data-i18n="category.trash">Trash</option>
                        <option value="unknown" data-i18n="category.unknown">Unknown</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="quick-log-description" class="form-control" required placeholder="What did you find?" data-i18n-placeholder="finds.quickLog.descPlaceholder">
                </div>
                <input type="hidden" id="quick-log-site-id">
                <input type="hidden" id="quick-log-latitude">
                <input type="hidden" id="quick-log-longitude">
                <div id="quick-log-location-status" class="text-muted text-sm" style="margin-bottom:8px;"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-quick-log-details" data-i18n="finds.quickLog.addDetails">Add Details</button>
                    <button type="submit" class="btn btn-primary" id="btn-quick-log-save" data-i18n="finds.quickLog.save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Photo Lightbox -->
    <div class="photo-lightbox" id="photo-lightbox" style="display:none;">
        <button class="photo-lightbox-close" id="lightbox-close">&times;</button>
        <button class="photo-lightbox-nav photo-lightbox-prev" id="lightbox-prev">&#10094;</button>
        <img id="lightbox-img" class="photo-lightbox-img" alt="Photo">
        <button class="photo-lightbox-nav photo-lightbox-next" id="lightbox-next">&#10095;</button>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/auth-nav.js"></script>
    <script src="/js/auth-widgets.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/offline-store.js"></script>
    <script src="/js/sync-engine.js"></script>
    <script src="/js/offline-ui.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/finds.js"></script>
    <script src="/js/finds-data.js"></script>
    <script src="/js/finds-photos.js"></script>
    <script src="/js/sw-register.js"></script>
</body>
</html>
